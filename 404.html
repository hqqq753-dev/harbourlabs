<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not found — Harbour Labs</title>
  <meta name="theme-color" content="#1D4D2E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF7F2;
      --green-dark: #1D4D2E;
      --green-soft: #2D6A3F;
      --green-muted: #a8c4b0;
      --orange: #C4622D;
      --text-muted: #6B6B6B;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }
    .mark {
      font-family: Georgia, serif;
      font-size: 96px;
      font-weight: 700;
      color: var(--green-dark);
      letter-spacing: -2px;
    }
    .mark span { color: var(--orange); }
    h1 {
      font-family: Georgia, serif;
      font-size: 28px;
      color: var(--green-dark);
      margin-top: 8px;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 28px;
      max-width: 420px;
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: var(--orange);
      color: var(--cream);
      font-family: Georgia, serif;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      border-radius: 8px;
    }
    a:hover { background: #cf6e3f; }
  </style>
</head>
<body>
  <div class="mark">404<span>.</span></div>
  <h1>Page not found.</h1>
  <p>The page you were looking for isn't here. It may have moved or never existed.</p>
  <a href="/">Back to home</a>
</body>
</html>
